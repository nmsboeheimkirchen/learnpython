name: Test and deploy static site

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  logic:
    name: Logic and validator tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked test dependencies
        run: npm ci --ignore-scripts

      - name: Run logic and validator tests
        run: npm test

  browser:
    name: Browser tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium-school-laptop
            engine: chromium
          - project: webkit-ipad
            engine: webkit

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked test dependencies
        run: npm ci --ignore-scripts

      - name: Install browser system dependencies
        run: npx playwright install-deps ${{ matrix.engine }}

      - name: Download Chromium headless shell
        if: matrix.engine == 'chromium'
        run: npx playwright install --only-shell chromium

      - name: Download WebKit
        if: matrix.engine == 'webkit'
        run: npx playwright install webkit

      - name: Run browser end-to-end tests
        run: npm run test:e2e -- --project=${{ matrix.project }}

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs:
      - logic
      - browser
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
